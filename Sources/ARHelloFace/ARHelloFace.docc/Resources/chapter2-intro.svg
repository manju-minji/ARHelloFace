<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#ECEFF7"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1F2A44" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- corner focus brackets -->
  <g stroke="#B9C2FB" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M300 150 L300 126 L324 126"/>
    <path d="M476 126 L500 126 L500 150"/>
    <path d="M300 330 L300 354 L324 354"/>
    <path d="M476 354 L500 354 L500 330"/>
  </g>

  <!-- face -->
  <g filter="url(#soft)">
    <path d="M400 150
             C452 150 488 192 488 248
             C488 312 452 350 400 350
             C348 350 312 312 312 248
             C312 192 348 150 400 150 Z"
          fill="#FFFFFF" stroke="#E2E7F2" stroke-width="2"/>
  </g>
  <!-- eyes -->
  <circle cx="372" cy="236" r="9" fill="#384256"/>
  <circle cx="428" cy="236" r="9" fill="#384256"/>
  <!-- smile -->
  <path d="M368 290 Q400 314 432 290" fill="none" stroke="#384256" stroke-width="7" stroke-linecap="round"/>

  <!-- glowing anchor points -->
  <g>
    <circle cx="400" cy="262" r="14" fill="#6366F1" opacity="0.18"/>
    <circle cx="400" cy="262" r="6" fill="#6366F1"/>
    <circle cx="340" cy="210" r="5" fill="#818CF8"/>
    <circle cx="460" cy="210" r="5" fill="#818CF8"/>
    <circle cx="356" cy="320" r="5" fill="#818CF8"/>
    <circle cx="444" cy="320" r="5" fill="#818CF8"/>
  </g>
</svg>
