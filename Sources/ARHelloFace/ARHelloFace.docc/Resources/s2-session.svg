<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#ECEFF7"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1F2A44" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- phone -->
  <g filter="url(#soft)">
    <rect x="318" y="96" width="164" height="288" rx="30" fill="#FFFFFF" stroke="#E2E7F2" stroke-width="2"/>
    <rect x="334" y="112" width="132" height="256" rx="18" fill="#F3F5FB"/>
  </g>
  <!-- front camera dot with concentric activation rings -->
  <circle cx="400" cy="150" r="46" fill="#6366F1" opacity="0.07"/>
  <circle cx="400" cy="150" r="32" fill="#6366F1" opacity="0.12"/>
  <circle cx="400" cy="150" r="18" fill="#6366F1" opacity="0.20"/>
  <circle cx="400" cy="150" r="8" fill="#6366F1"/>

  <!-- play badge (start session) -->
  <g filter="url(#soft)">
    <circle cx="400" cy="300" r="44" fill="#6366F1"/>
    <path d="M386 278 L424 300 L386 322 Z" fill="#FFFFFF"/>
  </g>
</svg>
