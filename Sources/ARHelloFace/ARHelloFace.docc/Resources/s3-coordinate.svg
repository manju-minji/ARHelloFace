<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#ECEFF7"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1F2A44" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- floating Hello pill above -->
  <g filter="url(#soft)">
    <rect x="306" y="92" width="188" height="68" rx="22" fill="#6366F1"/>
    <text x="400" y="138" text-anchor="middle" font-size="30" font-weight="800" fill="#FFFFFF">Hello 👋</text>
  </g>

  <!-- gentle up arrow (placement) -->
  <g stroke="#818CF8" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="400" y1="300" x2="400" y2="196"/>
    <path d="M376 220 L400 192 L424 220"/>
  </g>

  <!-- face -->
  <g filter="url(#soft)">
    <path d="M400 300
             C448 300 482 338 482 388
             C482 392 482 392 482 392
             L318 392
             C318 392 318 392 318 388
             C318 338 352 300 400 300 Z"
          fill="#FFFFFF" stroke="#E2E7F2" stroke-width="2"/>
  </g>
  <circle cx="374" cy="356" r="8" fill="#384256"/>
  <circle cx="426" cy="356" r="8" fill="#384256"/>
</svg>
