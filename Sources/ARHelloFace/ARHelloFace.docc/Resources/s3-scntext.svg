<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#ECEFF7"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1F2A44" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- 3D extruded "Hello" -->
  <g filter="url(#soft)" font-size="128" font-weight="800">
    <text x="218" y="296" fill="#C7CEF6">Hello</text>
    <text x="212" y="290" fill="#A9B2F0">Hello</text>
    <text x="206" y="284" fill="#8B96EA">Hello</text>
    <text x="200" y="278" fill="#6366F1">Hello</text>
  </g>

  <!-- subtle ground reflection -->
  <ellipse cx="400" cy="360" rx="210" ry="16" fill="#6366F1" opacity="0.08"/>
</svg>
