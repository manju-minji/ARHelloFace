  <!-- editor lines -->
  <rect x="322" y="216" width="170" height="10" rx="5" fill="#A9C4F5"/>
  <rect x="322" y="238" width="210" height="10" rx="5" fill="#D6DEE9"/>
  <rect x="322" y="260" width="150" height="10" rx="5" fill="#D6DEE9"/>
  <rect x="322" y="282" width="190" height="10" rx="5" fill="#D6DEE9"/>
