<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, 'Apple SD Gothic Neo', sans-serif">
  <rect x="0" y="0" width="760" height="520" rx="22" fill="#F6F8FB" stroke="#D8DFEA" stroke-width="2"/>

  <!-- chapter badge -->
  <rect x="40" y="40" width="150" height="48" rx="24" fill="#EFEAFE"/>
  <circle cx="64" cy="64" r="13" fill="#7C5CFC"/>
  <text x="64" y="69" text-anchor="middle" font-size="15" font-weight="800" fill="#FFFFFF">2</text>
  <text x="86" y="70" font-size="16" font-weight="700" fill="#5B3FE0">CHAPTER</text>

  <!-- detection brackets -->
  <g stroke="#7C5CFC" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M260 168 L260 140 L288 140"/>
    <path d="M500 140 L528 140 L528 168"/>
    <path d="M260 352 L260 380 L288 380"/>
    <path d="M500 380 L528 380 L528 352"/>
  </g>

  <!-- face -->
  <ellipse cx="394" cy="260" rx="96" ry="116" fill="#FFFFFF" stroke="#C7D0DE" stroke-width="2.5"/>

  <!-- face mesh landmark dots -->
  <g fill="#2563EB">
    <circle cx="360" cy="232" r="5"/><circle cx="428" cy="232" r="5"/>
    <circle cx="394" cy="258" r="5"/>
    <circle cx="368" cy="300" r="5"/><circle cx="420" cy="300" r="5"/>
    <circle cx="394" cy="312" r="5"/>
    <circle cx="340" cy="262" r="4"/><circle cx="448" cy="262" r="4"/>
    <circle cx="378" cy="206" r="4"/><circle cx="410" cy="206" r="4"/>
    <circle cx="356" cy="340" r="4"/><circle cx="432" cy="340" r="4"/>
  </g>
  <!-- mesh connecting lines -->
  <g stroke="#A9C4F5" stroke-width="1.6" fill="none">
    <path d="M360 232 L394 258 L428 232"/>
    <path d="M368 300 L394 312 L420 300"/>
    <path d="M340 262 L394 258 L448 262"/>
    <path d="M356 340 L394 312 L432 340"/>
    <path d="M378 206 L360 232 M410 206 L428 232"/>
  </g>

  <!-- anchor label -->
  <rect x="300" y="408" width="188" height="40" rx="20" fill="#7C5CFC"/>
  <text x="394" y="434" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">ARFaceAnchor</text>

  <text x="380" y="488" text-anchor="middle" font-size="26" font-weight="800" fill="#16202E">얼굴 인식 구현하기</text>
</svg>
