<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#ECEFF7"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1F2A44" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="800" height="480" rx="28" fill="url(#bg)"/>

  <!-- connecting flow -->
  <path d="M270 240 C340 240 460 240 530 240" fill="none" stroke="#B9C2FB" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 22"/>
  <circle cx="400" cy="240" r="9" fill="#6366F1"/>

  <!-- left tile: SwiftUI view -->
  <g filter="url(#soft)">
    <rect x="150" y="170" width="140" height="140" rx="28" fill="#FFFFFF" stroke="#E2E7F2" stroke-width="2"/>
  </g>
  <rect x="186" y="206" width="68" height="48" rx="10" fill="#EAEDFB"/>
  <rect x="186" y="266" width="68" height="12" rx="6" fill="#C7CEF6"/>

  <!-- right tile: coordinator (gear) -->
  <g filter="url(#soft)">
    <rect x="510" y="170" width="140" height="140" rx="28" fill="#FFFFFF" stroke="#E2E7F2" stroke-width="2"/>
  </g>
  <g transform="translate(580,240)">
    <g fill="#6366F1">
      <rect x="-6" y="-46" width="12" height="16" rx="3"/>
      <rect x="-6" y="30" width="12" height="16" rx="3"/>
      <rect x="-46" y="-6" width="16" height="12" rx="3"/>
      <rect x="30" y="-6" width="16" height="12" rx="3"/>
      <rect x="-38" y="-38" width="12" height="16" rx="3" transform="rotate(45)"/>
      <rect x="-38" y="22" width="12" height="16" rx="3" transform="rotate(45)"/>
    </g>
    <circle cx="0" cy="0" r="26" fill="#6366F1"/>
    <circle cx="0" cy="0" r="11" fill="#FFFFFF"/>
  </g>
</svg>
